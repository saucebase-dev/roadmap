# https://taskfile.dev
version: '3'

tasks:
    # ── Testing ───────────────────────────────────────────────────
    test:php:
        desc: Run PHPUnit tests for Roadmap module
        cmd: php artisan test --testsuite=Modules --filter='^Modules\\Roadmap\\Tests'

    test:e2e:
        desc: Run E2E tests for Roadmap module
        cmd: npx playwright test --project="@Roadmap*" {{.CLI_ARGS}}
        interactive: true
